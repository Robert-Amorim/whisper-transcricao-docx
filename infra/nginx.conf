map $http_x_forwarded_proto $voxora_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

upstream voxora_api {
    server 127.0.0.1:62011;
    keepalive 16;
}

server {
    listen 80;
    server_name voxora.integraretech.com.br;

    # TLS termina no OCI Load Balancer. O backend NGINX recebe HTTP interno.
    include /etc/nginx/snippets/voxora-locations.conf;
}

upstream voxora_api {
    server 127.0.0.1:3333;
    keepalive 16;
}

server {
    listen 80;
    server_name voxora.example.com;    # ← altere para seu domínio

    # Redirect HTTP → HTTPS (descomentar após Certbot)
    # return 301 https://$host$request_uri;

    # Temporário: servir diretamente em HTTP até configurar TLS
    include /etc/nginx/snippets/voxora-locations.conf;
}

